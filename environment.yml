# Conda alternative to requirements.txt, for labs that prefer conda/miniforge.
#   conda env create -f environment.yml
#   conda activate xon-aperiodic
name: xon-aperiodic
channels:
  - conda-forge
dependencies:
  - python>=3.9
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - matplotlib>=3.6
  - pyyaml>=6.0
  - pip
  - pip:
      - mne>=1.5,<2.0
      - fooof>=1.1
      - pyxdf>=1.16
      # - streamlit>=1.28   # uncomment for the GUI
